services:
  web:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  liquibase:
    image: docker.io/liquibase/liquibase:latest
    depends_on:
      - db
    volumes:
      - ./db/changelog:/liquibase/changelog
      - ./db/liquibase-lib:/liquibase/lib
    working_dir: /liquibase
    command: >
      liquibase
      --driver=org.postgresql.Driver
      --classpath=/liquibase/lib/postgresql.jar
      --url=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
      --searchPath=/liquibase/changelog
      --changeLogFile=master.xml
      --username=${DB_USER}
      --password=${DB_PASSWORD}
      update

volumes:
  postgres_data: